name: Backup Source Files

on:
  # 定时备份：每周日凌晨 3 点执行
  schedule:
    - cron: '0 3 * * 0'
  # 手动触发
  workflow_dispatch:
    inputs:
      target:
        description: 'Backup target'
        required: true
        default: 'local'
        type: choice
        options:
          - local
          - github

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Create backup
        run: node scripts/backup.mjs ${{ github.event.inputs.target || 'local' }}
        
      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backup-files
          path: .backups/
          retention-days: 30

      - name: Upload to GitHub Release
        if: github.event.inputs.target == 'github' || (github.event_name == 'schedule')
        run: |
          cd .backups
          ls -la
          if [ -n "$(ls -A *.tar.gz 2>/dev/null)" ]; then
            echo "Uploading backup files..."
            # 获取最新备份文件
            BACKUP_FILE=$(ls -t *.tar.gz | head -1)
            echo "Found backup: $BACKUP_FILE"
            
            # 创建带时间戳的 tag
            TAG_NAME="backup-$(date +%Y%m%d-%H%M%S)"
            
            # 检查 gh 命令
            if command -v gh &> /dev/null; then
              gh release create "$TAG_NAME" "$BACKUP_FILE" \
                --title "Backup $TAG_NAME" \
                --notes "Auto backup created at $(date)"
            else
              echo "GitHub CLI not available, skipping release upload"
            fi
          else
            echo "No backup files found"
          fi
        shell: bash
